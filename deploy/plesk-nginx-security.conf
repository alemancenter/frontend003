# Add in Plesk:
# Websites & Domains -> alemancenter.com -> Apache & nginx Settings
# -> Additional nginx directives
#
# These headers are needed because Plesk/nginx may serve / and static assets
# directly from Document Root before the request reaches the Node/Express app.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;
gzip on;
gzip_static on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
}

location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate" always;
}
