    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <!--
      Content Security Policy
      - script-src: self + Google/Facebook SDKs + AdSense/GTM. 'unsafe-inline'
        is required by Vite HMR in development and Radix/Tailwind in production.
        AdSense's adsbygoogle.js loads several Google sub-origins at runtime
        (ad rendering, consent messaging, ad-traffic-quality attribution) —
        all listed explicitly here rather than relaxed to a wildcard.
      - style-src: 'unsafe-inline' is required by Tailwind CSS utility classes
        injected at runtime and by Radix UI.
      - connect-src: same-origin API proxy, plus the Google ad-serving origins
        adsbygoogle.js calls directly via fetch/XHR/beacon (blocked with just
        'self', which is what caused the CSP console warnings).
      - object-src / base-uri: locked down to prevent plugin injection / base-tag hijack.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline'
        https://accounts.google.com
        https://connect.facebook.net
        https://pagead2.googlesyndication.com
        https://googleads.g.doubleclick.net
        https://tpc.googlesyndication.com
        https://www.google.com
        https://www.gstatic.com
        https://www.googletagmanager.com
        https://www.googletagservices.com
        https://fundingchoicesmessages.google.com
        https://ep1.adtrafficquality.google
        https://ep2.adtrafficquality.google
        https://adservice.google.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https:;
      connect-src 'self'
        https://pagead2.googlesyndication.com
        https://googleads.g.doubleclick.net
        https://tpc.googlesyndication.com
        https://www.google.com
        https://fundingchoicesmessages.google.com
        https://ep1.adtrafficquality.google
        https://ep2.adtrafficquality.google;
      frame-src
        https://accounts.google.com
        https://www.facebook.com
        https://googleads.g.doubleclick.net
        https://tpc.googlesyndication.com
        https://www.google.com
        https://fundingchoicesmessages.google.com
        https://ep2.adtrafficquality.google;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <!--
      Fonts are loaded non-render-blocking: the stylesheet is fetched with
      media="print" (so it never blocks first paint) then flipped to media="all"
      once loaded. Text paints immediately in the metric-matched fallback
      (see index.css) and swaps to Cairo with minimal layout shift. Weights are
      trimmed to the ones actually used to shrink the font payload.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;700&display=optional"

    <style>
      /* Instant first paint for the SPA shell (before the JS bundle renders),
         so FCP registers immediately instead of waiting on the full app bundle
         to download+parse. The brand TEXT (not just the spinner) is what makes
         this a *contentful* paint. */
      #app-shell{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0f172a;color:#e2e8f0;font-family:system-ui,"Segoe UI",Tahoma,Arial,sans-serif}

      @media (prefers-reduced-motion:reduce){#app-shell .s{animation:none}}
