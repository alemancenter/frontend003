# Plesk → Domains → alemancenter.com → Apache & nginx Settings
#   → "Additional nginx directives"  → paste the block below → OK.
#
# nginx intercepts /api/* and forwards it to the local Node service BEFORE it
# ever reaches Apache. Everything else falls through to Apache, which serves the
# static SPA (with the .htaccess fallback). Keep "Proxy mode" ON (the default).

location /api/ {
    proxy_pass         http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    # Must match the api-server's 25 MB raw-body limit (file uploads).
    client_max_body_size 25m;
}

# Long-cache the fingerprinted build assets (safe: filenames change on rebuild).
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
