kind = "web"
previewPath = "/"
title = "Alemancenter"
version = "1.0.0"
id = "artifacts/alemancenter-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19750

[services.development]
run = "pnpm --filter @workspace/alemancenter-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alemancenter-web", "run", "build" ]
publicDir = "artifacts/alemancenter-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19750"
BASE_PATH = "/"
